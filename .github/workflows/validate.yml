name: Validate

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & Format
        run: pnpm run lint && pnpm run format

      - name: Build
        if: steps.commit.outputs.has_changes != 'true'
        run: pnpm run build

      - name: Commit & Push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git add -A
            git commit -m "style: auto-format with prettier"
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: steps.commit.outputs.has_changes != 'true'
        run: npm run build

      - name: Docker build check
        if: steps.commit.outputs.has_changes != 'true'
        run: docker build --platform linux/amd64 -t dashboard:test .

      - name: Run container & health check
        if: steps.commit.outputs.has_changes != 'true'
        run: |
          docker run -d --name dashboard-test dashboard:test
          sleep 10
          docker exec dashboard-test curl -f http://localhost:3000 || exit 1
          docker stop dashboard-test
